<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор учёта доходов и расходов</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./js/main.js"></script>
</head>
<body>
    <h2>Добавить транзакцию</h2>
    <form id="addTransaction">
        <input required type="number" name="number" min="0.01" step="0.01">
        <select name="transactionType" id="transactionType" required>
            <option value="income">Доход</option>
            <option value="expense">Расход</option>
        </select>
        <select name="categoryIncome" id="categoryIncome" required>
            <option value="transaction">Перевод</option>
            <option value="salary">Зарплата</option>
            <option value="payment">Оплата</option>
        </select>
        <select name="categoryExpense" id="categoryExpense" required>
            <option value="food">Еда</option>
            <option value="transport">Транспорт</option>
            <option value="accommodation">Жильё</option>
            <option value="entertainment">Развлечения</option>
            <option value="health">Здоровье</option>
            <option value="telecom">Телеком</option>
            <option value="other">Другое</option>
        </select>
        <input name="date" type="date" required>
        <textarea name="comment" id="comment" placeholder="Ваш комментарий"></textarea>
        <button type="submit">Добавить</button>
        <p id="balance">Баланс: </p>
    </form>
    <form id="filter">
        <select id="filterType">
            <option value="all">Все типы</option>
            <option value="income">Доход</option>
            <option value="expense">Расходы</option>
        </select>
        <select id="filterCategory">
            <option value="">Все</option>
            <option value="transaction">Перевод</option>
            <option value="salary">Зарплата</option>
            <option value="payment">Оплата</option>
            <option value="food">Еда</option>
            <option value="transport">Транспорт</option>
            <option value="accommodation">Жильё</option>
            <option value="entertainment">Развлечения</option>
            <option value="health">Здоровье</option>
            <option value="telecom">Телеком</option>
            <option value="other">Другое</option>
        </select>
        <input type="date" id="filterDate">
        <button type="button" id="resetFilter">Сбросить фильтр</button>
    </form>
    <h2>Транзакции:</h2>
    <div class="container">
    </div>
</body>
</html>
